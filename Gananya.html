  @keyframes rgb {
    0% { color: #ff00ff; }
    50% { color: #00ffff;}

  }
  
  p {
    color: #00ffff;
    text-shadow:0 0 15px #ff00ff;

  }
  
  @keyframes halah {
    0% { color:#00ffff;}
    50% { color: #ff00ff;}
    100% { color:#00ffff;}
  }
  
  img {
    box-shadow: 0 0 25px #ff00ff;
  }
  
  .box {
    background: #ff00ff;
    color: #0d0221;
    padding: 20px;
    display: inline-block;
    text-align: center;
    margin-top: 200px;
    box-shadow: 0 0 40px #00ffff;
    text-decoration: none;
    cursor: pointer;
  }
  </style>
</head>
